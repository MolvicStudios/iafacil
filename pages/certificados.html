<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Certificados — IAFACIL.HELP</title>
    <meta name="description" content="Consulta y descarga tus certificados de los cursos completados en IAFACIL.HELP.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <link rel="stylesheet" href="/css/main.css">
    <!-- AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1513893788851225"
         crossorigin="anonymous"></script>
</head>
<body>

<div id="headerContainer"></div>

<main class="page-content" id="main-content">
    <div class="container">
        <h1 class="section-title animate-fadeInUp">🎓 Mis Certificados</h1>
        <p class="section-subtitle animate-fadeInUp delay-1">Certificados digitales de los cursos completados</p>

        <div id="certificatesList" class="animate-fadeInUp delay-2" style="margin-top:2rem;"></div>

        <div id="emptyState" class="text-center" style="padding:3rem; display:none;">
            <div style="font-size:4rem; margin-bottom:1rem;">🎓</div>
            <h3>Aún no tienes certificados</h3>
            <p class="text-muted" style="margin-bottom:1.5rem;">Completa un curso para obtener tu primer certificado digital</p>
            <a href="/pages/cursos/" class="btn btn-primary">📚 Explorar Cursos</a>
        </div>
    </div>
</main>

<div id="bottomNavContainer"></div>
<div id="footerContainer"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script type="module">
    import { renderHeader } from '/js/components/header.js';
    import { renderFooter } from '/js/components/footer.js';
    import { renderBottomNav } from '/js/components/bottomNav.js';
    import { toast } from '/js/components/toast.js';
    import { COURSES, getCourseById } from '/js/data/courses.js';

    renderHeader(document.getElementById('headerContainer'));
    renderFooter(document.getElementById('footerContainer'));
    renderBottomNav(document.getElementById('bottomNavContainer'));

    async function init() {
        const container = document.getElementById('certificatesList');
        const empty = document.getElementById('emptyState');

        try {
            const localProgress = JSON.parse(localStorage.getItem('iafacil-course-progress') || '[]');
            const profile = JSON.parse(localStorage.getItem('iafacil-profile') || '{}');

            const completed = (localProgress || []).filter(p => p.completed && p.quiz_passed);

            if (completed.length === 0) {
                empty.style.display = 'block';
                return;
            }

            const userName = profile?.cert_name || profile?.full_name || 'Estudiante';

            container.innerHTML = completed.map(p => {
                const course = getCourseById(p.course_id);
                const date = new Date(p.completed_at || p.updated_at).toLocaleDateString('es-ES', { year: 'numeric', month: 'long', day: 'numeric' });
                const certId = p.cert_id || `IAF-${p.course_id.toUpperCase().slice(0, 8)}-${Date.now().toString(36).toUpperCase().slice(-6)}`;
                const quizScore = p.quiz_score || 100;
                const levelLabel = course ? `${course.levelIcon} ${course.levelLabel}` : '';
                const courseTitle = course ? course.title : p.course_id;

                return `
                <div class="cert-card" style="
                    background: linear-gradient(135deg, #0a0e1a 0%, #0d1635 50%, #0a0e1a 100%);
                    border-radius: 16px;
                    margin-bottom: 2rem;
                    overflow: hidden;
                    position: relative;
                    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
                ">
                    <div style="height:6px; background:linear-gradient(90deg,#FFD700,#FFA500,#FFD700,#FFA500,#FFD700);"></div>

                    <!-- Corner ornaments -->
                    <div style="position:absolute;top:20px;left:20px;width:50px;height:50px;border-top:2px solid #FFD700;border-left:2px solid #FFD700;border-radius:4px 0 0 0;opacity:0.6;"></div>
                    <div style="position:absolute;top:20px;right:20px;width:50px;height:50px;border-top:2px solid #FFD700;border-right:2px solid #FFD700;border-radius:0 4px 0 0;opacity:0.6;"></div>
                    <div style="position:absolute;bottom:60px;left:20px;width:50px;height:50px;border-bottom:2px solid #FFD700;border-left:2px solid #FFD700;border-radius:0 0 0 4px;opacity:0.6;"></div>
                    <div style="position:absolute;bottom:60px;right:20px;width:50px;height:50px;border-bottom:2px solid #FFD700;border-right:2px solid #FFD700;border-radius:0 0 4px 0;opacity:0.6;"></div>

                    <div style="padding:2.5rem 2rem; text-align:center; position:relative; z-index:1;">
                        <!-- Logo -->
                        <div style="margin-bottom:1rem;">
                            <span style="background:rgba(255,215,0,0.1); border:1px solid rgba(255,215,0,0.3); padding:0.3rem 1rem; border-radius:50px; color:#FFD700; font-size:0.8rem; font-weight:700; letter-spacing:2px;">🤖 IAFACIL.HELP</span>
                        </div>

                        <!-- Title -->
                        <h2 style="color:#FFD700; font-size:clamp(1.3rem,3vw,1.8rem); font-weight:800; letter-spacing:1px; margin-bottom:0.25rem; text-shadow:0 2px 10px rgba(255,215,0,0.3);">
                            CERTIFICADO DE FINALIZACIÓN
                        </h2>
                        <div style="width:60px;height:2px;background:linear-gradient(90deg,transparent,#FFD700,transparent);margin:0.75rem auto 1.25rem;"></div>

                        <p style="color:rgba(255,255,255,0.55); font-size:0.85rem; text-transform:uppercase; letter-spacing:2px; margin-bottom:0.5rem;">Esto certifica que</p>
                        <h3 style="color:#fff; font-size:clamp(1.4rem,3.5vw,2.2rem); font-style:italic; font-weight:700; margin:0.25rem 0 1rem; text-shadow:0 2px 20px rgba(255,255,255,0.15);">${userName}</h3>
                        <p style="color:rgba(255,255,255,0.55); font-size:0.85rem; text-transform:uppercase; letter-spacing:2px; margin-bottom:0.75rem;">ha completado exitosamente el curso</p>

                        <div style="background:rgba(255,215,0,0.08);border:1px solid rgba(255,215,0,0.25);border-radius:10px;padding:0.875rem 1.5rem;margin:0 auto 1.25rem;max-width:560px;">
                            <div style="color:#FFD700; font-size:clamp(1rem,2.5vw,1.3rem); font-weight:700;">${courseTitle}</div>
                        </div>

                        <div style="display:flex;justify-content:center;gap:1.5rem;flex-wrap:wrap;margin-bottom:1.25rem;">
                            <span style="color:rgba(255,255,255,0.65); font-size:0.85rem;">📊 Resultado: <strong style="color:#4ade80;">${quizScore}%</strong></span>
                            <span style="color:rgba(255,255,255,0.65); font-size:0.85rem;">🎯 ${levelLabel}</span>
                            <span style="color:rgba(255,255,255,0.65); font-size:0.85rem;">📅 ${date}</span>
                        </div>

                        <!-- Seal -->
                        <div style="margin:0.5rem auto 1rem; display:inline-block;">
                            <svg viewBox="0 0 100 100" style="width:64px;height:64px;">
                                <polygon points="50,5 61,35 93,35 68,57 79,91 50,70 21,91 32,57 7,35 39,35" fill="rgba(255,215,0,0.12)" stroke="#FFD700" stroke-width="1.5"/>
                                <text x="50" y="55" text-anchor="middle" fill="#FFD700" font-size="20" font-weight="bold">✓</text>
                            </svg>
                        </div>

                        <p style="color:rgba(255,255,255,0.2); font-size:0.7rem; letter-spacing:1px; margin-bottom:1.5rem;">ID: ${certId}</p>

                        <!-- Buttons -->
                        <div class="cert-actions" style="display:flex; gap:0.75rem; justify-content:center; flex-wrap:wrap;">
                            <button class="btn download-cert"
                                style="background:linear-gradient(135deg,#FFD700,#FFA500);color:#000;border:none;font-weight:700;padding:0.625rem 1.25rem;"
                                data-name="${userName}" data-course="${courseTitle}" data-date="${date}" data-id="${certId}" data-score="${quizScore}" data-level="${levelLabel}">
                                📥 Guardar PDF
                            </button>
                            <button class="btn print-cert btn-outline"
                                style="border-color:#FFD700;color:#FFD700;padding:0.625rem 1.25rem;"
                                data-name="${userName}" data-course="${courseTitle}" data-date="${date}" data-id="${certId}" data-score="${quizScore}" data-level="${levelLabel}">
                                🖨️ Imprimir
                            </button>
                            <a href="/pages/cursos/curso.html?id=${p.course_id}" class="btn btn-outline"
                                style="border-color:rgba(255,255,255,0.25);color:rgba(255,255,255,0.6);padding:0.625rem 1.25rem;">
                                📚 Ver curso
                            </a>
                        </div>
                    </div>

                    <div style="height:4px; background:linear-gradient(90deg,#FFD700,#FFA500,#FFD700,#FFA500,#FFD700);"></div>
                </div>
            `}).join('');

            // Certificate HTML builder (matching premium design)
            function buildCertHTML(data) {
                return `<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><title>Certificado \u2014 ${data.course}</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lato:wght@300;400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Lato',sans-serif;background:#0a0e1a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.cert{background:linear-gradient(135deg,#0a0e1a 0%,#0d1635 50%,#0a0e1a 100%);width:100%;max-width:900px;position:relative;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.bar{background:linear-gradient(90deg,#FFD700,#FFA500,#FFD700,#FFA500,#FFD700)}
.bar-top{height:8px}
.bar-bot{height:5px}
.corner{position:absolute;width:70px;height:70px;border-color:#FFD700;border-style:solid;opacity:.65}
.tl{top:20px;left:20px;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
.tr{top:20px;right:20px;border-width:3px 3px 0 0;border-radius:0 4px 0 0}
.bl{bottom:20px;left:20px;border-width:0 0 3px 3px;border-radius:0 0 0 4px}
.br{bottom:20px;right:20px;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
.inner{padding:60px 80px;text-align:center;position:relative;z-index:1}
.logo-pill{display:inline-flex;align-items:center;gap:8px;background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.3);padding:6px 18px;border-radius:50px;margin-bottom:20px;color:#FFD700;font-size:13px;font-weight:700;letter-spacing:3px}
.cert-title{font-family:'Playfair Display',serif;color:#FFD700;font-size:2.3rem;font-weight:700;letter-spacing:2px;text-shadow:0 2px 10px rgba(255,215,0,.3)}
.divider{width:100px;height:2px;background:linear-gradient(90deg,transparent,#FFD700,transparent);margin:16px auto 28px}
.lbl{color:rgba(255,255,255,.5);font-size:13px;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.student{font-family:'Playfair Display',serif;color:#fff;font-size:3rem;font-style:italic;margin:8px 0 24px;text-shadow:0 2px 20px rgba(255,255,255,.12)}
.course-box{background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.25);border-radius:10px;padding:16px 32px;margin:12px auto 24px;display:inline-block;max-width:700px}
.course-name{color:#FFD700;font-size:1.6rem;font-weight:700}
.meta{display:flex;justify-content:center;gap:32px;flex-wrap:wrap;margin:20px 0;color:rgba(255,255,255,.6);font-size:14px}
.meta strong{color:#4ade80}
.cert-id{color:rgba(255,255,255,.22);font-size:11px;letter-spacing:1px;margin-top:14px}
@media print{body{background:#fff;padding:0}.cert{box-shadow:none}}
</style></head><body>
<div class="cert">
<div class="bar bar-top"></div>
<div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>
<div class="inner">
<div class="logo-pill">🤖 IAFACIL.HELP</div>
<div class="cert-title">CERTIFICADO DE FINALIZACIÓN</div>
<div class="divider"></div>
<div class="lbl">Esto certifica que</div>
<div class="student">${data.name}</div>
<div class="lbl">ha completado exitosamente el curso</div>
<div class="course-box"><div class="course-name">${data.course}</div></div>
<div class="meta">
  <span>📊 Resultado del Examen Final: <strong>${data.score}%</strong></span>
  <span>🎯 ${data.level}</span>
  <span>📅 ${data.date}</span>
</div>
<svg viewBox="0 0 100 100" style="width:70px;height:70px;margin:8px auto;display:block">
  <polygon points="50,5 61,35 93,35 68,57 79,91 50,70 21,91 32,57 7,35 39,35" fill="rgba(255,215,0,.12)" stroke="#FFD700" stroke-width="1.5"/>
  <text x="50" y="55" text-anchor="middle" fill="#FFD700" font-size="20" font-weight="bold">✓</text>
</svg>
<div class="cert-id">Certificado ID: ${data.id}</div>
</div>
<div class="bar bar-bot"></div>
</div></body></html>`;
            }

            // Print buttons
            container.querySelectorAll('.print-cert').forEach(btn => {
                btn.addEventListener('click', () => {
                    const data = { name: btn.dataset.name, course: btn.dataset.course, date: btn.dataset.date, id: btn.dataset.id, score: btn.dataset.score, level: btn.dataset.level };
                    const w = window.open('', '_blank');
                    if (w) { w.document.write(buildCertHTML(data)); w.document.close(); w.print(); }
                });
            });

            // Download buttons — generates a real PDF via html2canvas + jsPDF
            container.querySelectorAll('.download-cert').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const data = { name: btn.dataset.name, course: btn.dataset.course, date: btn.dataset.date, id: btn.dataset.id, score: btn.dataset.score, level: btn.dataset.level };
                    const certCard = btn.closest('.cert-card');
                    const actionsEl = certCard.querySelector('.cert-actions');

                    btn.disabled = true;
                    btn.textContent = '⏳ Generando PDF...';
                    if (actionsEl) actionsEl.style.visibility = 'hidden';

                    try {
                        const canvas = await html2canvas(certCard, {
                            scale: 2,
                            useCORS: true,
                            backgroundColor: '#0a0e1a',
                            logging: false,
                            ignoreElements: el => el.classList.contains('cert-actions')
                        });

                        const imgData = canvas.toDataURL('image/png');
                        const { jsPDF } = window.jspdf;
                        const pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
                        const pdfW = pdf.internal.pageSize.getWidth();   // 297mm
                        const pdfH = pdf.internal.pageSize.getHeight();  // 210mm
                        const imgRatio = canvas.width / canvas.height;
                        const drawW = pdfW;
                        const drawH = drawW / imgRatio;
                        const yOff = Math.max(0, (pdfH - drawH) / 2);
                        pdf.addImage(imgData, 'PNG', 0, yOff, drawW, Math.min(drawH, pdfH));
                        pdf.save(`certificado-${data.course.toLowerCase().replace(/[^a-z0-9]+/g, '-').slice(0, 40)}.pdf`);
                        toast.success('✅ PDF descargado correctamente');
                    } catch (err) {
                        console.error('PDF generation error:', err);
                        toast.error('❌ Error al generar el PDF. Inténtalo de nuevo.');
                    } finally {
                        btn.disabled = false;
                        btn.textContent = '📥 Guardar PDF';
                        if (actionsEl) actionsEl.style.visibility = 'visible';
                    }
                });
            });

        } catch (err) {
            container.innerHTML = '<p class="text-muted text-center" style="padding:2rem;">Error al cargar certificados</p>';
        }
    }

    init();
</script>

<script src="/cookie-consent.js"></script>
</body>
</html>
