<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — IAFACIL.HELP</title>
    <meta name="description" content="Inicia sesión en IAFACIL.HELP y continúa aprendiendo Inteligencia Artificial con cursos interactivos y herramientas prácticas.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>

<div class="auth-page">
    <div class="auth-container">
        <div class="auth-logo">
            <a href="/">
                <span class="logo-icon" style="font-size:2.5rem">🤖</span>
                <div class="auth-logo-text">IAFACIL<span class="logo-accent">.HELP</span></div>
            </a>
        </div>

        <div class="auth-card animate-fadeInUp">
            <h1 class="auth-title">¡Bienvenido de vuelta!</h1>
            <p class="auth-subtitle">Inicia sesión para continuar aprendiendo</p>

            <!-- Formulario -->
            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="tu@email.com" required autocomplete="email">
                    <span class="form-error" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" class="form-input" placeholder="Tu contraseña" required autocomplete="current-password">
                        <button type="button" class="password-toggle" aria-label="Mostrar contraseña">👁️</button>
                    </div>
                    <span class="form-error" id="passwordError"></span>
                </div>

                <div class="auth-forgot">
                    <a href="/pages/auth/forgot-password.html">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg" id="btnSubmit">
                    Iniciar sesión
                </button>
            </form>

            <div class="auth-links">
                ¿No tienes cuenta? <a href="/pages/auth/register.html">Regístrate gratis</a>
            </div>
        </div>

        <div class="auth-motivation">
            <span class="motivation-icon">💡</span>
            "El mejor momento para aprender IA fue ayer. El segundo mejor momento es ahora."
        </div>
    </div>
</div>

<!-- Alert container for toasts -->
<div class="toast-container" id="toastContainer"></div>

<script type="module">
    import { authService } from '/js/services/auth.js';

    const form = document.getElementById('loginForm');
    const btnSubmit = document.getElementById('btnSubmit');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');

    // Toggle password visibility
    document.querySelector('.password-toggle').addEventListener('click', function() {
        const input = this.previousElementSibling;
        const isPassword = input.type === 'password';
        input.type = isPassword ? 'text' : 'password';
        this.textContent = isPassword ? '🙈' : '👁️';
    });

    // Login con email
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        clearErrors();

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        if (!email) return showError('emailError', 'Ingresa tu email');
        if (!password) return showError('passwordError', 'Ingresa tu contraseña');

        btnSubmit.classList.add('btn-loading');
        btnSubmit.disabled = true;

        try {
            await authService.login(email, password);
            // Redirige automáticamente por el auth state change
        } catch (err) {
            showToast('Email o contraseña incorrectos', 'error');
        } finally {
            btnSubmit.classList.remove('btn-loading');
            btnSubmit.disabled = false;
        }
    });

    function showError(id, msg) {
        document.getElementById(id).textContent = msg;
    }

    function clearErrors() {
        document.querySelectorAll('.form-error').forEach(el => el.textContent = '');
    }

    function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }
</script>

<script src="/cookie-consent.js"></script>
</body>
</html>
