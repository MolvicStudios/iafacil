<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — IAFACIL.HELP</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>

<div class="auth-page">
    <div class="auth-container">
        <div class="auth-logo">
            <a href="/">
                <span class="logo-icon" style="font-size:2.5rem">🤖</span>
                <div class="auth-logo-text">IAFACIL<span class="logo-accent">.HELP</span></div>
            </a>
        </div>

        <div class="auth-card animate-fadeInUp">
            <h1 class="auth-title">¡Bienvenido de vuelta!</h1>
            <p class="auth-subtitle">Inicia sesión para continuar aprendiendo</p>

            <!-- Google OAuth -->
            <button class="btn btn-google btn-block" id="btnGoogle">
                <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.56c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.56-2.77c-.98.66-2.23 1.06-3.72 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Continuar con Google
            </button>

            <div class="auth-divider">o usa tu email</div>

            <!-- Formulario -->
            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="tu@email.com" required autocomplete="email">
                    <span class="form-error" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" class="form-input" placeholder="Tu contraseña" required autocomplete="current-password">
                        <button type="button" class="password-toggle" aria-label="Mostrar contraseña">👁️</button>
                    </div>
                    <span class="form-error" id="passwordError"></span>
                </div>

                <div class="auth-forgot">
                    <a href="/pages/auth/forgot-password.html">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg" id="btnSubmit">
                    Iniciar sesión
                </button>
            </form>

            <div class="auth-links">
                ¿No tienes cuenta? <a href="/pages/auth/register.html">Regístrate gratis</a>
            </div>
        </div>

        <div class="auth-motivation">
            <span class="motivation-icon">💡</span>
            "El mejor momento para aprender IA fue ayer. El segundo mejor momento es ahora."
        </div>
    </div>
</div>

<!-- Alert container for toasts -->
<div class="toast-container" id="toastContainer"></div>

<script type="module">
    import { authService } from '/js/services/auth.js';

    const form = document.getElementById('loginForm');
    const btnGoogle = document.getElementById('btnGoogle');
    const btnSubmit = document.getElementById('btnSubmit');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');

    // Toggle password visibility
    document.querySelector('.password-toggle').addEventListener('click', function() {
        const input = this.previousElementSibling;
        const isPassword = input.type === 'password';
        input.type = isPassword ? 'text' : 'password';
        this.textContent = isPassword ? '🙈' : '👁️';
    });

    // Login con email
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        clearErrors();

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        if (!email) return showError('emailError', 'Ingresa tu email');
        if (!password) return showError('passwordError', 'Ingresa tu contraseña');

        btnSubmit.classList.add('btn-loading');
        btnSubmit.disabled = true;

        try {
            await authService.login(email, password);
            // Redirige automáticamente por el auth state change
        } catch (err) {
            showToast('Email o contraseña incorrectos', 'error');
        } finally {
            btnSubmit.classList.remove('btn-loading');
            btnSubmit.disabled = false;
        }
    });

    // Login con Google
    btnGoogle.addEventListener('click', async () => {
        try {
            await authService.loginWithGoogle();
        } catch (err) {
            showToast('Error al conectar con Google', 'error');
        }
    });

    function showError(id, msg) {
        document.getElementById(id).textContent = msg;
    }

    function clearErrors() {
        document.querySelectorAll('.form-error').forEach(el => el.textContent = '');
    }

    function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }
</script>

</body>
</html>
