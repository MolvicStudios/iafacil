    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña — IAFACIL.HELP</title>
    <meta name="description" content="Recupera la contraseña de tu cuenta en IAFACIL.HELP para seguir aprendiendo IA.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>

<div class="auth-page">
    <div class="auth-container">
        <div class="auth-logo">
            <a href="/">
                <span class="logo-icon" style="font-size:2.5rem">🤖</span>
                <div class="auth-logo-text">IAFACIL<span class="logo-accent">.HELP</span></div>
            </a>
        </div>

        <div class="auth-card animate-fadeInUp">
            <h1 class="auth-title">Recuperar contraseña</h1>
            <p class="auth-subtitle">Te enviaremos un enlace para restablecer tu contraseña</p>

            <form id="forgotForm" novalidate>
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="tu@email.com" required autocomplete="email">
                    <span class="form-error" id="emailError"></span>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg" id="btnSubmit">
                    Enviar enlace
                </button>
            </form>

            <!-- Mensaje de éxito (oculto por defecto) -->
            <div id="successMessage" class="d-none" style="text-align:center; padding: 2rem 0;">
                <div style="font-size:3rem; margin-bottom:1rem;">📧</div>
                <h2 style="margin-bottom:0.5rem;">¡Email enviado!</h2>
                <p style="color:var(--text-secondary);">Revisa tu bandeja de entrada y sigue el enlace para restablecer tu contraseña.</p>
            </div>

            <div class="auth-links">
                <a href="/pages/auth/login.html">← Volver al inicio de sesión</a>
            </div>
        </div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script type="module">
    import { authService } from '/js/services/auth.js';

    const form = document.getElementById('forgotForm');
    const btnSubmit = document.getElementById('btnSubmit');
    const successMessage = document.getElementById('successMessage');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();

        if (!email) {
            document.getElementById('emailError').textContent = 'Ingresa tu email';
            return;
        }

        btnSubmit.classList.add('btn-loading');
        btnSubmit.disabled = true;

        try {
            await authService.forgotPassword(email);
            form.classList.add('d-none');
            successMessage.classList.remove('d-none');
        } catch (err) {
            showToast('Error al enviar el email. Verifica tu dirección.', 'error');
        } finally {
            btnSubmit.classList.remove('btn-loading');
            btnSubmit.disabled = false;
        }
    });

    function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }
</script>

</body>
</html>
