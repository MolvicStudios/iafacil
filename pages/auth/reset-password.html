<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva contraseña — IAFACIL.HELP</title>
    <meta name="description" content="Establece una nueva contraseña para tu cuenta en IAFACIL.HELP.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <link rel="stylesheet" href="/css/main.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1513893788851225" crossorigin="anonymous"></script>
</head>
<body>

<div class="auth-page">
    <div class="auth-container">
        <div class="auth-logo">
            <a href="/">
                <span class="logo-icon" style="font-size:2.5rem">🤖</span>
                <div class="auth-logo-text">IAFACIL<span class="logo-accent">.HELP</span></div>
            </a>
        </div>

        <div class="auth-card animate-fadeInUp">
            <h1 class="auth-title">Nueva contraseña</h1>
            <p class="auth-subtitle">Elige una nueva contraseña para tu cuenta</p>

            <form id="resetForm" novalidate>
                <div class="form-group">
                    <label class="form-label" for="password">Nueva contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" class="form-input" placeholder="Mínimo 8 caracteres" required minlength="8" autocomplete="new-password">
                        <button type="button" class="password-toggle" aria-label="Mostrar contraseña">👁️</button>
                    </div>
                    <span class="form-error" id="passwordError"></span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Confirmar contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" class="form-input" placeholder="Repite tu contraseña" required autocomplete="new-password">
                        <button type="button" class="password-toggle" aria-label="Mostrar contraseña">👁️</button>
                    </div>
                    <span class="form-error" id="confirmPasswordError"></span>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg" id="btnSubmit">
                    Guardar contraseña
                </button>
            </form>
        </div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script type="module">
    import { authService } from '/js/services/auth.js';

    const form = document.getElementById('resetForm');
    const btnSubmit = document.getElementById('btnSubmit');

    // Toggle password visibility
    document.querySelectorAll('.password-toggle').forEach(btn => {
        btn.addEventListener('click', function() {
            const input = this.previousElementSibling;
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            this.textContent = isPassword ? '🙈' : '👁️';
        });
    });

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirmPassword').value;

        document.querySelectorAll('.form-error').forEach(el => el.textContent = '');

        let valid = true;
        if (password.length < 8) { document.getElementById('passwordError').textContent = 'Mínimo 8 caracteres'; valid = false; }
        if (password !== confirm) { document.getElementById('confirmPasswordError').textContent = 'Las contraseñas no coinciden'; valid = false; }
        if (!valid) return;

        btnSubmit.classList.add('btn-loading');
        btnSubmit.disabled = true;

        try {
            await authService.updatePassword(password);
            showToast('¡Contraseña actualizada!', 'success');
            setTimeout(() => {
                window.location.href = '/pages/auth/login.html';
            }, 1500);
        } catch (err) {
            showToast('Error al actualizar la contraseña', 'error');
        } finally {
            btnSubmit.classList.remove('btn-loading');
            btnSubmit.disabled = false;
        }
    });

    function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }
</script>

</body>
</html>
