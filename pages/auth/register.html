<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear cuenta — IAFACIL.HELP</title>
    <meta name="description" content="Crea tu cuenta gratuita en IAFACIL.HELP y empieza a aprender Inteligencia Artificial sin necesidad de programar.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <link rel="stylesheet" href="/css/main.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1513893788851225" crossorigin="anonymous"></script>
</head>
<body>

<div class="auth-page">
    <div class="auth-container">
        <div class="auth-logo">
            <a href="/">
                <span class="logo-icon" style="font-size:2.5rem">🤖</span>
                <div class="auth-logo-text">IAFACIL<span class="logo-accent">.HELP</span></div>
            </a>
        </div>

        <div class="auth-card animate-fadeInUp">
            <h1 class="auth-title">Crea tu cuenta gratis</h1>
            <p class="auth-subtitle">Únete y aprende IA de forma fácil y divertida</p>

            <!-- Formulario -->
            <form id="registerForm" novalidate>
                <div class="form-group">
                    <label class="form-label" for="name">Nombre completo</label>
                    <input type="text" id="name" class="form-input" placeholder="Tu nombre" required autocomplete="name">
                    <span class="form-error" id="nameError"></span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="tu@email.com" required autocomplete="email">
                    <span class="form-error" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" class="form-input" placeholder="Mínimo 8 caracteres" required minlength="8" autocomplete="new-password">
                        <button type="button" class="password-toggle" aria-label="Mostrar contraseña">👁️</button>
                    </div>
                    <span class="form-error" id="passwordError"></span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Confirmar contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" class="form-input" placeholder="Repite tu contraseña" required autocomplete="new-password">
                        <button type="button" class="password-toggle" aria-label="Mostrar contraseña">👁️</button>
                    </div>
                    <span class="form-error" id="confirmPasswordError"></span>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg" id="btnSubmit">
                    Crear mi cuenta
                </button>
            </form>

            <div class="auth-links">
                ¿Ya tienes cuenta? <a href="/pages/auth/login.html">Inicia sesión</a>
            </div>
        </div>

        <div class="auth-motivation">
            <span class="motivation-icon">🚀</span>
            "Cada experto fue una vez principiante."
        </div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script type="module">
    import { authService } from '/js/services/auth.js';

    const form = document.getElementById('registerForm');
    const btnSubmit = document.getElementById('btnSubmit');

    // Toggle password visibility
    document.querySelectorAll('.password-toggle').forEach(btn => {
        btn.addEventListener('click', function() {
            const input = this.previousElementSibling;
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            this.textContent = isPassword ? '🙈' : '👁️';
        });
    });

    // Registro con email
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        clearErrors();

        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirmPassword').value;

        // Validaciones
        let valid = true;
        if (!name) { showError('nameError', 'Ingresa tu nombre'); valid = false; }
        if (!email) { showError('emailError', 'Ingresa tu email'); valid = false; }
        if (password.length < 8) { showError('passwordError', 'Mínimo 8 caracteres'); valid = false; }
        if (password !== confirm) { showError('confirmPasswordError', 'Las contraseñas no coinciden'); valid = false; }
        if (!valid) return;

        btnSubmit.classList.add('btn-loading');
        btnSubmit.disabled = true;

        try {
            await authService.register(email, password, name);
            showToast('¡Cuenta creada! Revisa tu email para confirmar.', 'success');
        } catch (err) {
            if (err.message?.includes('already registered')) {
                showToast('Este email ya está registrado', 'error');
            } else {
                showToast('Error al crear la cuenta. Intenta de nuevo.', 'error');
            }
        } finally {
            btnSubmit.classList.remove('btn-loading');
            btnSubmit.disabled = false;
        }
    });

    function showError(id, msg) {
        document.getElementById(id).textContent = msg;
    }

    function clearErrors() {
        document.querySelectorAll('.form-error').forEach(el => el.textContent = '');
    }

    function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }
</script>

</body>
</html>
