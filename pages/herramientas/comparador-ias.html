        },
        deepseek: {

    function compare() {
        const id1 = document.getElementById('ia1').value;
        const id2 = document.getElementById('ia2').value;

            toast.warning('Selecciona dos IAs diferentes');
            return;

        const ia2 = iaData[id2];
        const table = document.getElementById('comparisonTable');

        const catLabels = { texto: '✍️ Texto', codigo: '💻 Código', creativo: '🎨 Creatividad', analisis: '🔍 Análisis', velocidad: '⚡ Velocidad' };

        table.innerHTML = `
        <div class="comparison-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:2rem;">
            ${[ia1, ia2].map(ia => `
            <div class="card" style="padding:1.5rem;">
                <div style="text-align:center; margin-bottom:1rem;">
                    <div style="font-size:2.5rem;">${ia.icon}</div>
                    <h3>${ia.name}</h3>

                </div>
                <div style="margin-bottom:1rem;">
                    <div class="text-sm"><strong>Precio:</strong> ${ia.pricing}</div>
                    <div class="text-sm"><strong>Contexto:</strong> ${ia.contextWindow}</div>
                    <div class="text-sm"><strong>Mejor para:</strong> ${ia.bestFor}</div>
                </div>
                <h4 style="margin-bottom:0.5rem;">Fortalezas</h4>
                <ul style="margin-bottom:1rem;">${ia.strengths.map(s => `<li class="text-sm">✅ ${s}</li>`).join('')}</ul>
                <h4 style="margin-bottom:0.5rem;">Debilidades</h4>
                <ul>${ia.weaknesses.map(w => `<li class="text-sm">⚠️ ${w}</li>`).join('')}</ul>
            </div>
            `).join('')}
        </div>

        <h3 style="margin-top:2rem; margin-bottom:1rem;">Comparación por categoría</h3>
        ${categories.map(cat => {
            const s1 = ia1.rating[cat];
            const s2 = ia2.rating[cat];
            const winner = s1 > s2 ? 'left' : s2 > s1 ? 'right' : 'tie';
            return `
            <div class="criteria-row" style="margin-bottom:0.75rem;">
                <span style="min-width:120px; font-weight:600;">${catLabels[cat]}</span>
                <div style="flex:1; display:flex; align-items:center; gap:0.5rem;">
                    <span class="text-sm" style="width:40px; text-align:right; font-weight:${winner==='left'?'700':'400'}; color:${winner==='left'?'var(--color-primary)':'inherit'}">${s1}/10</span>
                    <div style="flex:1; height:8px; background:var(--bg-secondary); border-radius:4px; display:flex; overflow:hidden;">
                        <div style="width:${s1*10}%; background:var(--color-primary); border-radius:4px 0 0 4px;"></div>
                        <div style="width:${(10-s1)*10}%; background:transparent;"></div>
                    </div>
                    <div style="flex:1; height:8px; background:var(--bg-secondary); border-radius:4px; display:flex; overflow:hidden;">
                        <div style="width:${s2*10}%; background:var(--color-secondary); border-radius:4px 0 0 4px;"></div>
                    </div>
                    <span class="text-sm" style="width:40px; font-weight:${winner==='right'?'700':'400'}; color:${winner==='right'?'var(--color-secondary)':'inherit'}">${s2}/10</span>
                </div>
            </div>`;
        }).join('')}
        `;
