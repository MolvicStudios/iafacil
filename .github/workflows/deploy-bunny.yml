name: Deploy to Bunny.net

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy to Bunny Storage
        env:
          BUNNY_STORAGE_PASSWORD: ${{ secrets.BUNNY_STORAGE_PASSWORD }}
          BUNNY_STORAGE_ZONE: ${{ secrets.BUNNY_STORAGE_ZONE }}
        run: |
          shopt -s globstar dotglob

          STORAGE_URL="https://storage.bunnycdn.com/${BUNNY_STORAGE_ZONE}"

          # Function to upload a file
          upload_file() {
            local file="$1"
            local remote_path="${file}"
            
            echo "Uploading: ${file}"
            curl -s --fail \
              -X PUT \
              -H "AccessKey: ${BUNNY_STORAGE_PASSWORD}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@${file}" \
              "${STORAGE_URL}/${remote_path}" || echo "FAILED: ${file}"
          }

          # Upload all files
          find . -type f \
            ! -path './.git/*' \
            ! -path './.github/*' \
            ! -name '.gitignore' \
            ! -name 'README.md' \
            | while read -r file; do
                # Remove leading ./
                file="${file#./}"
                upload_file "${file}"
              done

          echo "✅ Deployment complete!"

      - name: Purge Bunny CDN Cache
        if: success()
        env:
          BUNNY_API_KEY: ${{ secrets.BUNNY_API_KEY }}
          BUNNY_PULL_ZONE_ID: ${{ secrets.BUNNY_PULL_ZONE_ID }}
        run: |
          if [ -n "$BUNNY_PULL_ZONE_ID" ] && [ -n "$BUNNY_API_KEY" ]; then
            echo "Purging CDN cache..."
            curl -s --fail \
              -X POST \
              -H "AccessKey: ${BUNNY_API_KEY}" \
              "https://api.bunny.net/pullzone/${BUNNY_PULL_ZONE_ID}/purgeCache" \
              && echo "✅ Cache purged!" \
              || echo "⚠️ Cache purge failed (non-critical)"
          else
            echo "⏩ Skipping cache purge (BUNNY_PULL_ZONE_ID or BUNNY_API_KEY not set)"
          fi
